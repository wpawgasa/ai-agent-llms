# Qwen3.6 27B (FP8) + Dflash speculative decoding (SGLang)
# Draft model: z-lab/Qwen3.6-27B-DFlash (BF16 draft pairs with FP8 target —
# speculative decoding only requires shared tokenizer/vocab, not matching dtype).
# DFLASH disables SGLang's overlap scheduler and mixed-chunked-prefill;
# also requires pp_size=1 and enable_dp_attention=false (enforced by launcher).
# Hybrid DeltaNet + DFLASH triggers --mamba-scheduler-strategy=extra_buffer
# and SGLANG_ENABLE_SPEC_V2=1 (auto-applied by launch_sglang.sh).
model:
  name: "Qwen/Qwen3.6-27B-FP8"
  family: "qwen35"
  architecture: "hybrid_deltanet_transformer"
  params_total: 27_000_000_000
  params_active: 27_000_000_000
  context_length: 262144
  precision: "fp8_e4m3"
  vram_estimate_gb: 27

serving:
  engine: "sglang"
  tool_call_parser: "qwen"
  # chat_template intentionally omitted: SGLang falls back to the HF tokenizer's
  # built-in chat_template (canonical for Qwen instruct models).
  mem_fraction_static: 0.95
  context_length: 8192
  max_running_requests: 64    # DFLASH single-H100 ceiling (see *_dflash_sglang.yaml)
  attention_backend: "triton"
  port: 8000
  kv_cache_dtype: "auto"
  pp_size: 1
  enable_dp_attention: false
  speculative:
    enabled: true
    algorithm: "DFLASH"
    draft_model_path: "z-lab/Qwen3.6-27B-DFlash"
    num_draft_tokens: 4    # SGLang requires num_draft_tokens == dflash_block_size for DFLASH
    dflash_block_size: 4
    dflash_draft_window_size: 16

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 2048

category: "A"
benchmark_tasks: []
