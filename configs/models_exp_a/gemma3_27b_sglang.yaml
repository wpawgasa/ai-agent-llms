model:
  name: "google/gemma-3-27b-it"
  family: "gemma"
  architecture: "dense_gqa_transformer"
  params_total: 27_000_000_000
  params_active: 27_000_000_000
  context_length: 131072
  precision: "bfloat16"
  vram_estimate_gb: 54

serving:
  engine: "sglang"
  tool_call_parser: "pythonic"   # SGLang has no dedicated Gemma parser
  chat_template: "gemma"
  mem_fraction_static: 0.90
  context_length: 8192
  max_running_requests: 256
  attention_backend: "triton"    # safer default; switch to flashinfer if build succeeds
  port: 8000
  kv_cache_dtype: "auto"

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 2048
