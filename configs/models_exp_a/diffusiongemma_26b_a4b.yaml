model:
  name: "google/diffusiongemma-26B-A4B-it"
  family: "gemma"
  architecture: "diffusion_moe_transformer"
  params_total: 25_200_000_000
  params_active: 3_800_000_000
  context_length: 262144
  precision: "bfloat16"
  vram_estimate_gb: 50

serving:
  engine: "vllm"
  tool_call_parser: "gemma4"
  chat_template: "gemma"
  gpu_memory_utilization: 0.90
  max_model_len: 8192
  enforce_eager: false
  # Per the DiffusionGemma model card: canvas decode is memory-heavy.
  max_num_seqs: 4
  # diffusiongemma uses discrete-diffusion (multi-canvas) sampling, NOT standard
  # autoregressive decode. Verified 2026-06-11: no tagged vLLM release supports
  # it (latest 0.22.1; transformers added the defs in 5.11.0). Support is on
  # vLLM's `dgemma` branch (PR #45163, open) — serve via deployments/models/
  # with VLLM_IMAGE=vllm/vllm-openai:gemma-cu129, VLLM_USE_V2_MODEL_RUNNER=1 and
  # VLLM_TRUST_REMOTE_CODE=1 (see .env.example preset). launch_vllm.sh's
  # .venv-infer (vLLM 0.20.0) CANNOT serve this.
  hf_overrides:
    rope_scaling: null
    diffusion_sampler: "entropy_bound"
    diffusion_entropy_bound: 0.1

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 2048
