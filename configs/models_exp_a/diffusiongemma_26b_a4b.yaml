model:
  name: "google/diffusiongemma-26B-A4B-it"
  family: "gemma"
  architecture: "diffusion_moe_transformer"
  params_total: 25_200_000_000
  params_active: 3_800_000_000
  context_length: 262144
  precision: "bfloat16"
  vram_estimate_gb: 50

serving:
  engine: "vllm"
  tool_call_parser: "gemma4"
  chat_template: "gemma"
  gpu_memory_utilization: 0.90
  max_model_len: 8192
  enforce_eager: false
  # CAUTION: diffusiongemma uses discrete-diffusion (multi-canvas) sampling, NOT
  # standard autoregressive decode. vLLM serving of the diffusion path is
  # unverified here — validate generation before trusting benchmark numbers.
  hf_overrides:
    rope_scaling: null

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 2048
