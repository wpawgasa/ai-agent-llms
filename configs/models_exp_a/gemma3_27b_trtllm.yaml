model:
  name: "google/gemma-3-27b-it"
  family: "gemma"
  architecture: "dense_gqa_transformer"
  params_total: 27_000_000_000
  params_active: 27_000_000_000
  context_length: 131072
  precision: "bfloat16"
  vram_estimate_gb: 54

serving:
  engine: "tensorrt_llm"
  source: "hf"       # JIT-from-HF; change to "engine_dir" after trtllm-build
  # engine_dir: "checkpoints/trt-engines/gemma3_27b_bf16"
  tool_call_parser: null   # TRT-LLM has no built-in parser; client post-parses
  port: 8000
  max_batch_size: 256
  max_num_tokens: 8192
  tp_size: 1
  kv_cache_dtype: "auto"   # fp8 requires trtllm-build --kv_cache_type fp8

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 2048
