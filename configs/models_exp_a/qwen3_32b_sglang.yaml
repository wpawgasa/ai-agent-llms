model:
  name: "Qwen/Qwen3-32B"
  family: "qwen"
  architecture: "dense_gqa_transformer"
  params_total: 32_000_000_000
  params_active: 32_000_000_000
  context_length: 131072
  precision: "bfloat16"
  vram_estimate_gb: 64

serving:
  engine: "sglang"
  tool_call_parser: "qwen25"    # vLLM uses "hermes"; SGLang uses "qwen25"
  chat_template: "qwen2.5"
  mem_fraction_static: 0.90
  context_length: 8192
  max_running_requests: 256
  attention_backend: "triton"
  port: 8000
  kv_cache_dtype: "auto"

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 2048
