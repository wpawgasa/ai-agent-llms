model:
  name: "RedHatAI/diffusiongemma-26B-A4B-it-FP8-dynamic"
  family: "gemma"
  architecture: "diffusion_moe_transformer"
  params_total: 25_200_000_000
  params_active: 3_800_000_000
  context_length: 262144
  precision: "fp8_e4m3"
  vram_estimate_gb: 26

serving:
  engine: "tensorrt_llm"
  source: "hf"
  # engine_dir: "checkpoints/trt-engines/diffusiongemma_26b_a4b_fp8"
  # CAUTION: discrete-diffusion (multi-canvas) sampling is not a standard AR decode
  # path; SGLang/TensorRT-LLM support for diffusiongemma is unverified — validate
  # before benchmarking.
  tool_call_parser: null
  port: 8000
  max_batch_size: 256
  max_num_tokens: 8192
  tp_size: 1
  kv_cache_dtype: "auto"

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 2048
