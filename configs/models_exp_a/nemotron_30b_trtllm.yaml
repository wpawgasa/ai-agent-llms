model:
  name: "nvidia/Nemotron-3-30B"
  family: "nemotron"
  architecture: "dense_gqa_transformer"
  params_total: 30_000_000_000
  params_active: 30_000_000_000
  context_length: 131072
  precision: "bfloat16"
  vram_estimate_gb: 60

serving:
  engine: "tensorrt_llm"
  source: "hf"
  # engine_dir: "checkpoints/trt-engines/nemotron_30b_bf16"
  tool_call_parser: null
  port: 8000
  max_batch_size: 256
  max_num_tokens: 8192
  tp_size: 1
  kv_cache_dtype: "auto"
  # Mamba hybrid models may not be supported by TRT-LLM 1.2.x.
  # Uncomment the line below if trtllm-serve fails on this model:
  # skip_reason: "Mamba hybrid architecture not supported by TRT-LLM 1.2.x"

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 2048
