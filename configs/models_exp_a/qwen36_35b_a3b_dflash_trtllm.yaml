# Qwen3.6 35B-A3B + Dflash speculative decoding (TensorRT-LLM)
# Draft model: z-lab/Qwen3.6-35B-A3B-DFlash
# Engine must be pre-built with NVIDIA ModelOpt (PR #1211). The Dflash heads
# are baked into the TRT engine at build time, so source=engine_dir is required.
# See scripts/build_trtllm_engines.sh for build instructions.
model:
  name: "Qwen/Qwen3.6-35B-A3B"
  family: "qwen35"
  architecture: "moe_deltanet_transformer"
  params_total: 35_000_000_000
  params_active: 3_000_000_000
  context_length: 262144
  precision: "bfloat16"
  vram_estimate_gb: 70

serving:
  engine: "tensorrt_llm"
  source: "engine_dir"
  engine_dir: "checkpoints/trt-engines/qwen36_35b_a3b_bf16_dflash"
  tool_call_parser: null
  port: 8000
  max_batch_size: 64      # DFLASH single-H100 ceiling (see *_dflash_sglang.yaml)
  max_num_tokens: 8192
  tp_size: 1
  kv_cache_dtype: "auto"
  speculative:
    enabled: true
    mode: "dflash"
    build_recipe: "modelopt_recipes/general/speculative_decoding/dflash.yaml"
    build_params:
      block_size: 4
      num_layers: 1
      mask_token_id: 0
      num_anchors: 16
      attention_heads: 8

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 2048

category: "A"
benchmark_tasks: []
