# Gemma-4 31B-it (FP8) + Dflash speculative decoding (SGLang)
# Draft model: z-lab/gemma-4-31B-it-DFlash (BF16 draft pairs with FP8 target —
# speculative decoding only requires shared tokenizer/vocab, not matching dtype).
# DFLASH disables SGLang's overlap scheduler and mixed-chunked-prefill;
# also requires pp_size=1 and enable_dp_attention=false (enforced by launcher).
model:
  name: "RedHatAI/gemma-4-31B-it-FP8-block"
  family: "gemma"
  architecture: "dense_gqa_transformer"
  params_total: 31_000_000_000
  params_active: 31_000_000_000
  context_length: 262144
  precision: "fp8_e4m3"
  vram_estimate_gb: 32

serving:
  engine: "sglang"
  tool_call_parser: "gemma4"
  reasoning_parser: "gemma4"
  # chat_template intentionally omitted: SGLang falls back to the HF tokenizer's
  # built-in chat_template (canonical for Gemma 4 instruct models).
  mem_fraction_static: 0.85
  context_length: 8192
  max_running_requests: 64    # DFLASH single-H100 ceiling (see *_dflash_sglang.yaml)
  attention_backend: "triton"
  port: 8000
  kv_cache_dtype: "auto"
  pp_size: 1
  enable_dp_attention: false
  speculative:
    enabled: true
    algorithm: "DFLASH"
    draft_model_path: "z-lab/gemma-4-31B-it-DFlash"
    num_draft_tokens: 4    # SGLang requires num_draft_tokens == dflash_block_size for DFLASH
    dflash_block_size: 4
    dflash_draft_window_size: 16

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 2048

category: "A"
benchmark_tasks: []
