# Qwen3.6 27B (FP8) + Dflash speculative decoding (vLLM)
# Draft model: z-lab/Qwen3.6-27B-DFlash (BF16 draft pairs with FP8 target —
# speculative decoding only requires shared tokenizer/vocab, not matching dtype).
# vLLM ships DFlashQwen3ForCausalLM natively (vllm/model_executor/models/qwen3_dflash.py),
# so the Qwen3 DFlash draft is first-class. Qwen3.6 is a DeltaNet+dense hybrid;
# the hybrid guard in arg_utils.py:1676 is scoped to TurboQuant only, not DFlash.
model:
  name: "Qwen/Qwen3.6-27B-FP8"
  family: "qwen35"
  architecture: "hybrid_deltanet_transformer"
  params_total: 27_000_000_000
  params_active: 27_000_000_000
  context_length: 262144
  precision: "fp8_e4m3"
  vram_estimate_gb: 27

serving:
  engine: "vllm"
  tool_call_parser: "qwen3_coder"
  chat_template: "chatml"
  gpu_memory_utilization: 0.95
  max_model_len: 8192
  max_num_seqs: 64        # DFLASH single-H100 ceiling (see *_dflash_sglang.yaml)
  enforce_eager: false
  port: 8000
  speculative:
    enabled: true
    method: "dflash"
    draft_model: "z-lab/Qwen3.6-27B-DFlash"
    num_speculative_tokens: 5
    # NB: vLLM's SpeculativeConfig does not accept dflash_block_size /
    # dflash_draft_window_size kwargs. block_size is derived from the draft
    # model's KV-cache spec; mask token comes from the draft model's
    # config.json (dflash_config.mask_token_id / pard_token / ptd_token_id).

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 2048

category: "A"
benchmark_tasks: []
