model:
  name: "google/gemma-2b"
  family: "gemma"
  architecture: "dense_mqa_transformer"
  params_total: 2_000_000_000
  params_active: 2_000_000_000
  context_length: 8192
  precision: "bfloat16"
  vram_estimate_gb: 5

serving:
  engine: "sglang"
  tool_call_parser: "pythonic"
  chat_template: "gemma"
  mem_fraction_static: 0.90
  context_length: 4096
  max_running_requests: 2048
  attention_backend: "triton"
  port: 8000
  kv_cache_dtype: "auto"

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 1024
