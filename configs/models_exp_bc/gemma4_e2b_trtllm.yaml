model:
  name: "google/gemma-4-E2B-it"
  family: "gemma"
  architecture: "dense_gqa_transformer"
  params_total: 2_000_000_000
  params_active: 2_000_000_000
  context_length: 262144
  precision: "bfloat16"
  vram_estimate_gb: 4

serving:
  engine: "tensorrt_llm"
  source: "hf"
  # engine_dir: "checkpoints/trt-engines/gemma4_e2b_bf16"
  tool_call_parser: null
  port: 8000
  max_batch_size: 1024
  max_num_tokens: 8192
  tp_size: 1
  kv_cache_dtype: "auto"

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 2048
