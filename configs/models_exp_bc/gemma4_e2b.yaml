model:
  name: "google/gemma-4-E2B-it"
  family: "gemma"
  architecture: "dense_gqa_transformer"
  params_total: 2_000_000_000
  params_active: 2_000_000_000
  context_length: 262144
  precision: "bfloat16"
  vram_estimate_gb: 4

serving:
  engine: "vllm"
  tool_call_parser: "gemma4"
  chat_template: "gemma"
  gpu_memory_utilization: 0.90
  max_model_len: 8192
  enforce_eager: false
  hf_overrides:
    rope_scaling: null

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 2048
