model:
  name: "google/gemma-2b"
  family: "gemma"
  architecture: "dense_mqa_transformer"
  params_total: 2_000_000_000
  params_active: 2_000_000_000
  context_length: 8192
  precision: "bfloat16"
  vram_estimate_gb: 5

serving:
  engine: "tensorrt_llm"
  source: "hf"
  # engine_dir: "checkpoints/trt-engines/gemma_2b_bf16"
  tool_call_parser: null
  port: 8000
  max_batch_size: 2048
  max_num_tokens: 4096
  tp_size: 1
  kv_cache_dtype: "auto"

inference:
  temperature_deterministic: 0.0
  temperature_stochastic: 0.7
  stochastic_trials: 5
  max_tokens: 1024
