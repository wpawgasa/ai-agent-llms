stage: "sft"
framework: "unsloth"

model:
  # Populated at runtime from Phase 1 winner (Cat A)
  # Expected winner: one of configs/models/cat_a/*.yaml
  config_path: null

lora:
  rank: 64
  alpha: 128
  dropout: 0.05
  target_modules: "auto"
  freeze_router: true

training:
  precision: "bf16"
  learning_rate: 5.0e-5
  lr_scheduler: "cosine"
  warmup_ratio: 0.05
  effective_batch_size: 8
  num_epochs: 3
  max_seq_length: 8192
  gradient_checkpointing: true
  packing: true

data:
  source: "data/output/sft/task_a_cleaned"
  format: "chatml"
  splits:
    train: 0.85
    val: 0.10
    test: 0.05

logging:
  wandb_project: "llm-workflow-agents-sft"
  save_steps: 500
  eval_steps: 500
  metric_for_best_model: "eval_loss"
