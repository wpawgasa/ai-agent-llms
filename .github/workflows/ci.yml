name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          # Use only the `dev` extra in CI. `train` and `infer` pin
          # mutually-incompatible torch / transformers / vLLM versions
          # and cannot be installed together (see pyproject.toml).
          uv sync --extra dev
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests with coverage
        run: |
          source .venv/bin/activate
          PYTHONPATH=src pytest tests/ -v --cov=llm_workflow_agents --cov-report=term-missing --cov-fail-under=70

      - name: Upload coverage report
        if: matrix.python-version == '3.12' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
