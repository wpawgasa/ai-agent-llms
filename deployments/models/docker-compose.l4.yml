# =============================================================================
# vLLM Model Serving — NVIDIA L4 24GB
# =============================================================================
# Single-L4 variant of docker-compose.yml. Identical generic `vllm` service —
# the model and flags come entirely from `.env`:
#
#   cd deployments/models
#   cp .env.example .env        # set HF_TOKEN, VLLM_MODEL, VLLM_TOOL_CALL_PARSER
#   docker compose -f docker-compose.l4.yml up
#
# Only models that fit a 24GB L4 with KV-cache headroom are viable here — the
# small Gemma-4 Cat-BC models. Use the L4 preset blocks in .env.example:
#   VLLM_MODEL=google/gemma-4-E4B-it   VLLM_TOOL_CALL_PARSER=gemma4
#   VLLM_MODEL=google/gemma-4-E2B-it   VLLM_TOOL_CALL_PARSER=gemma4
#
# NOTE — no Qwen3.6 variant fits a single 24GB L4: the smallest is
# Qwen3.6-27B-FP8 (~27GB), and every mid-size FP8 variant (26–35GB) exceeds 24GB.
# To run those on L4-class hardware, use 2× L4 (48GB) and add
# VLLM_EXTRA_ARGS="--tensor-parallel-size 2" in .env (count: all already grants
# both GPUs to the container).
#
# Prerequisite: the shared network must exist first (created by the
# deployments/local/ stack, or once via: docker network create llm-benchmark-network).
# =============================================================================

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 600s          # first run downloads + loads weights (can be minutes)

services:

  vllm:
    # Override VLLM_IMAGE in .env for models needing a newer/branch build
    # (see docker-compose.yml for details).
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.20.0}
    container_name: vllm-l4-model
    ipc: host                   # vLLM needs host shared memory
    restart: unless-stopped
    ports:
      - "${VLLM_PORT:-8000}:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      # --- served model + flags (configured in .env) -----------------------
      VLLM_MODEL: ${VLLM_MODEL:?set VLLM_MODEL in .env (e.g. google/gemma-4-E4B-it)}
      VLLM_DTYPE: ${VLLM_DTYPE:-bfloat16}
      VLLM_TOOL_CALL_PARSER: ${VLLM_TOOL_CALL_PARSER:?set VLLM_TOOL_CALL_PARSER in .env (e.g. gemma4)}
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-8192}
      VLLM_HF_OVERRIDES: ${VLLM_HF_OVERRIDES:-}
      VLLM_KV_CACHE_DTYPE: ${VLLM_KV_CACHE_DTYPE:-}
      VLLM_ENFORCE_EAGER: ${VLLM_ENFORCE_EAGER:-}
      VLLM_TRUST_REMOTE_CODE: ${VLLM_TRUST_REMOTE_CODE:-}
      VLLM_EXTRA_ARGS: ${VLLM_EXTRA_ARGS:-}
      # Real vLLM env var — must be unset (not empty) when unused; the
      # entrypoint unsets it if blank (see docker-compose.yml).
      VLLM_USE_V2_MODEL_RUNNER: ${VLLM_USE_V2_MODEL_RUNNER:-}
      # --- LMCache CPU KV-cache offload (opt-in; see .env.example) ----------
      VLLM_LMCACHE_ENABLED: ${VLLM_LMCACHE_ENABLED:-}
      VLLM_LMCACHE_CPU_SIZE: ${VLLM_LMCACHE_CPU_SIZE:-20}
      VLLM_LMCACHE_CHUNK_SIZE: ${VLLM_LMCACHE_CHUNK_SIZE:-256}
      VLLM_LMCACHE_VERSION: ${VLLM_LMCACHE_VERSION:-}
      VLLM_LMCACHE_KV_TRANSFER_CONFIG: ${VLLM_LMCACHE_KV_TRANSFER_CONFIG:-}
      # Testing affordance: when non-empty, the entrypoint prints resolved args +
      # LMCache env and exits 0 without pip-installing or launching vLLM.
      VLLM_ENTRYPOINT_DRY_RUN: ${VLLM_ENTRYPOINT_DRY_RUN:-}
    volumes:
      - "${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/root/.cache/huggingface"
    networks:
      - llm-benchmark-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
    # Build the vLLM arg list at runtime so optional flags (hf-overrides,
    # kv-cache-dtype, enforce-eager) are only passed when their var is non-empty.
    # `$$` keeps expansion in the container shell, not docker-compose substitution.
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -eu
        # vLLM reads VLLM_USE_V2_MODEL_RUNNER itself via int() — empty string
        # raises ValueError at import, so drop it entirely when blank.
        if [ -z "$${VLLM_USE_V2_MODEL_RUNNER:-}" ]; then unset VLLM_USE_V2_MODEL_RUNNER; fi
        args=(
          --model "$${VLLM_MODEL}"
          --dtype "$${VLLM_DTYPE}"
          --tool-call-parser "$${VLLM_TOOL_CALL_PARSER}"
          --gpu-memory-utilization "$${VLLM_GPU_MEMORY_UTILIZATION}"
          --max-model-len "$${VLLM_MAX_MODEL_LEN}"
          --enable-auto-tool-choice
          --port 8000
        )
        if [ -n "$${VLLM_HF_OVERRIDES}" ];  then args+=(--hf-overrides "$${VLLM_HF_OVERRIDES}"); fi
        if [ -n "$${VLLM_KV_CACHE_DTYPE}" ]; then args+=(--kv-cache-dtype "$${VLLM_KV_CACHE_DTYPE}"); fi
        if [ -n "$${VLLM_ENFORCE_EAGER}" ];  then args+=(--enforce-eager); fi
        if [ -n "$${VLLM_TRUST_REMOTE_CODE}" ]; then args+=(--trust-remote-code); fi
        if [ -n "$${VLLM_EXTRA_ARGS}" ];     then args+=($${VLLM_EXTRA_ARGS}); fi
        # LMCache CPU KV-cache offload (opt-in). Full-precision KV is offloaded
        # GPU->CPU and re-fetched on prefix reuse. Incompatible with the custom
        # turboquant*/rotorquant* backends (both hook KV cache I/O) -> hard fail.
        if [ -n "$${VLLM_LMCACHE_ENABLED:-}" ]; then
          case "$${VLLM_KV_CACHE_DTYPE:-}" in
            turboquant*|rotorquant*)
              echo "ERROR: VLLM_LMCACHE_ENABLED + VLLM_KV_CACHE_DTYPE=$${VLLM_KV_CACHE_DTYPE} is unsupported (LMCache and the custom quant backends both hook KV cache I/O)." >&2
              exit 1 ;;
          esac
          if [ -n "$${VLLM_ENTRYPOINT_DRY_RUN:-}" ]; then
            echo "DRY_RUN: would pip install lmcache$${VLLM_LMCACHE_VERSION:+==$${VLLM_LMCACHE_VERSION}}"
          else
            pip install --no-cache-dir "lmcache$${VLLM_LMCACHE_VERSION:+==$${VLLM_LMCACHE_VERSION}}"
          fi
          export LMCACHE_LOCAL_CPU=true
          export LMCACHE_MAX_LOCAL_CPU_SIZE="$${VLLM_LMCACHE_CPU_SIZE:-20}"
          export LMCACHE_CHUNK_SIZE="$${VLLM_LMCACHE_CHUNK_SIZE:-256}"
          kv_xfer="$${VLLM_LMCACHE_KV_TRANSFER_CONFIG:-}"
          if [ -z "$${kv_xfer}" ]; then
            kv_xfer='{"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}'
          fi
          args+=(--kv-transfer-config "$${kv_xfer}")
        fi
        echo "Launching: python3 -m vllm.entrypoints.openai.api_server $${args[*]}"
        if [ -n "$${VLLM_ENTRYPOINT_DRY_RUN:-}" ]; then
          echo "LMCACHE_LOCAL_CPU=$${LMCACHE_LOCAL_CPU:-}"
          echo "LMCACHE_MAX_LOCAL_CPU_SIZE=$${LMCACHE_MAX_LOCAL_CPU_SIZE:-}"
          echo "LMCACHE_CHUNK_SIZE=$${LMCACHE_CHUNK_SIZE:-}"
          exit 0
        fi
        exec python3 -m vllm.entrypoints.openai.api_server "$${args[@]}"

networks:
  llm-benchmark-network:
    external: true
    name: llm-benchmark-network
